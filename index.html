 <!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RADIOLA - RETINA LANDSCAPE</title>
    <style>
        :root {
            --neon: #00FF41;
            --dim-neon: #004d14;
            --alert: #FF3333;
            --warn: #FFA500;
            --bg: #030303;
            --panel: #0d0d0d;
            --border-width: 2px;
        }

        body {
            background-color: var(--bg); color: var(--neon);
            font-family: 'Segoe UI', 'Roboto', sans-serif; font-weight: 900;
            margin: 0; padding: 5px; height: 100vh; box-sizing: border-box;
            overflow: hidden; display: flex; flex-direction: column; text-transform: uppercase;
        }

        /* GŁÓWNY KONTENER - PODZIAŁ PIONOWY (GÓRA / DÓŁ) */
        #app-container {
            display: flex; flex-direction: column; height: 100%; width: 100%; gap: 5px;
        }

        /* SEKCJA GÓRNA - PODZIAŁ POZIOMY (LEWA / PRAWA) */
        #top-section {
            display: flex; flex: 1; gap: 5px; overflow: hidden;
        }

        /* --- LEWY PANEL (WYSZUKIWARKA + LISTA) --- */
        #left-panel {
            width: 220px; display: flex; flex-direction: column; gap: 5px;
            border: var(--border-width) solid var(--neon); background: var(--panel); padding: 5px;
        }

        #search-bar { display: flex; gap: 4px; }
        
        input[type="text"] {
            background: #000; border: 1px solid var(--dim-neon); color: var(--neon);
            padding: 6px; font-family: inherit; font-weight: 900; width: 100%; box-sizing: border-box;
            font-size: 11px; -webkit-appearance: none; border-radius: 0;
        }
        input[type="text"]:focus { border-color: var(--neon); outline: none; }

        .btn-small {
            background: #000; border: 1px solid var(--neon); color: var(--neon);
            padding: 6px 10px; font-family: inherit; font-weight: 900; font-size: 10px;
            cursor: pointer; -webkit-appearance: none; border-radius: 0;
        }
        .btn-small:active { background: var(--dim-neon); color: white; }

        #results-list {
            flex: 1; overflow-y: auto; background: #000; border: 1px solid #1a1a1a;
            -webkit-overflow-scrolling: touch; /* Płynne przewijanie na iOS */
        }

        .station-row {
            padding: 8px 5px; border-bottom: 1px solid #1a1a1a; font-size: 10px;
            cursor: pointer; background: #050505; transition: 0.2s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .station-row.playing { background: #003300; border-left: 3px solid var(--neon); color: white; }
        .station-row:active { background: var(--dim-neon); }


        /* --- PRAWY PANEL (GRAFIKA + INFO) --- */
        #right-panel {
            flex: 1; border: var(--border-width) solid var(--neon); background: var(--panel);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px; position: relative;
        }

        #cover-art {
            width: 100px; height: 100px; border: 2px solid var(--neon); background: #000;
            display: flex; align-items: center; justify-content: center; margin-bottom: 10px;
            overflow: hidden; box-shadow: 0 0 10px rgba(0,255,65,0.2);
        }
        #cover-art img { width: 100%; height: 100%; object-fit: cover; }
        #cover-art .placeholder { font-size: 30px; color: var(--dim-neon); }

        #meta-name { margin: 0; font-size: 14px; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #meta-details { margin: 5px 0 10px 0; font-size: 10px; color: #888; font-family: monospace; }

        /* WIZUALIZATOR W TLE / NA DOLE PRAWEGO PANELU */
        #visual-wrapper {
            background: #000; border: 1px solid var(--dim-neon); height: 40px; width: 80%;
            display: flex; align-items: flex-end; justify-content: space-between;
            gap: 2px; padding: 2px; box-sizing: border-box; overflow: hidden;
        }
        .v-bar { 
            background: var(--neon); flex: 1; height: 100%; 
            transform-origin: bottom; transform: scaleY(0.05); will-change: transform;
        }


        /* --- DOLNY PANEL (PLAYER BAR) --- */
        #bottom-bar {
            height: 45px; border: var(--border-width) solid var(--neon); background: var(--panel);
            display: flex; align-items: center; padding: 0 10px; gap: 15px; flex-shrink: 0;
        }

        #main-play-btn {
            width: 40px; height: 30px; font-size: 16px; display: flex; align-items: center; justify-content: center;
            background: #000; border: 2px solid var(--neon); color: var(--neon); cursor: pointer;
        }
        #main-play-btn:active { background: var(--neon); color: black; }

        /* SUWAK GŁOŚNOŚCI */
        input[type="range"] {
            -webkit-appearance: none; flex: 1; background: #000; border: 1px solid var(--dim-neon); height: 15px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 15px; background: var(--neon); border: 1px solid black;
        }

        #status-text { flex: 1; font-size: 10px; text-align: right; color: var(--warn); font-family: monospace; white-space: nowrap; overflow: hidden;}

        .status-led {
            width: 12px; height: 12px; border-radius: 50%; border: 1px solid black; flex-shrink: 0;
        }
        .led-idle { background-color: #333; }
        .led-linking { background-color: var(--warn); animation: blink-fast 0.3s infinite; }
        .led-locked { background-color: #00F3FF; box-shadow: 0 0 10px #00F3FF; }
        .led-error { background-color: var(--alert); box-shadow: 0 0 10px var(--alert); }

        @keyframes blink-fast { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }

        /* Pasek scrolla dla webkita */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; border-left: 1px solid var(--dim-neon); }
        ::-webkit-scrollbar-thumb { background: var(--dim-neon); }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon); }
    </style>
</head>
<body>

<div id="app-container">
    
    <div id="top-section">
        <div id="left-panel">
            <div id="search-bar">
                <input type="text" id="scanTag" placeholder="PROMPT (np. techno)">
                <button class="btn-small" onclick="initiateScan()">SZUKAJ</button>
            </div>
            <div id="results-list">
                <div style="padding:10px; font-size:10px; color:#555; text-align:center;">OCZEKIWANIE NA ZAPYTANIE...</div>
            </div>
        </div>

        <div id="right-panel">
            <div id="cover-art">
                <div class="placeholder">⚡</div>
            </div>
            <h2 id="meta-name">SYSTEM READY</h2>
            <p id="meta-details">AWAITING INPUT // NO SIGNAL</p>
            
            <div id="visual-wrapper"></div>
        </div>
    </div>

    <div id="bottom-bar">
        <button id="main-play-btn" onclick="toggleMainPlay()">▶</button>
        <input type="range" id="volControl" min="0" max="1" step="0.05" value="0.7">
        <div id="status-text">IDLE</div>
        <div id="conn-led" class="status-led led-idle"></div>
    </div>

</div>

<audio id="audio-core"></audio>

<script>
    var SERVERS = ["https://de1.api.radio-browser.info", "https://at1.api.radio-browser.info"];
    var currentServerIndex = 0;
    var foundStations = [];
    var activeStationIndex = -1;
    
    var audio = document.getElementById('audio-core');
    var led = document.getElementById('conn-led');
    var statusText = document.getElementById('status-text');
    var playBtn = document.getElementById('main-play-btn');

    // Obsługa zdarzeń Audio
    audio.addEventListener('loadstart', function() { led.className = 'status-led led-linking'; statusText.innerText = "BUFOROWANIE..."; });
    audio.addEventListener('playing', function() { led.className = 'status-led led-locked'; statusText.innerText = "POŁĄCZONO"; playBtn.innerText = "⏸"; });
    audio.addEventListener('error', function() { led.className = 'status-led led-error'; statusText.innerText = "BŁĄD STRUMIENIA"; playBtn.innerText = "▶"; });
    audio.addEventListener('pause', function() { led.className = 'status-led led-idle'; statusText.innerText = "ZATRZYMANO"; playBtn.innerText = "▶"; });

    // Inicjalizacja wizualizatora
    var vizWrapper = document.getElementById('visual-wrapper');
    var bars = [];
    for(var i=0; i<12; i++) {
        var bar = document.createElement('div');
        bar.className = 'v-bar';
        vizWrapper.appendChild(bar);
        bars.push(bar);
    }

    function initiateScan() {
        var tag = document.getElementById('scanTag').value;
        if(!tag) return;

        var list = document.getElementById('results-list');
        list.innerHTML = '<div style="padding:10px; font-size:10px; text-align:center; color:var(--warn);">SKANOWANIE...</div>';
        
        var url = SERVERS[currentServerIndex] + "/json/stations/search?limit=40&tag=" + encodeURIComponent(tag) + "&hidebroken=true";
        
        fetch(url).then(function(r) { return r.json(); }).then(function(data) {
            // Filtrujemy tylko HTTPS dla GitHub Pages/iOS
            foundStations = data.filter(function(s) { return s.url && s.url.indexOf('https:') === 0; }).slice(0, 30);
            
            if(foundStations.length > 0) {
                renderList();
            } else {
                list.innerHTML = '<div style="padding:10px; font-size:10px; text-align:center; color:var(--alert);">BRAK WYNIKÓW (HTTPS)</div>';
            }
        }).catch(function() {
            list.innerHTML = '<div style="padding:10px; font-size:10px; text-align:center; color:var(--alert);">BŁĄD SERWERA API</div>';
        });
    }

    function renderList() {
        var list = document.getElementById('results-list');
        list.innerHTML = '';
        
        foundStations.forEach(function(s, idx) {
            var row = document.createElement('div');
            row.className = 'station-row';
            row.id = 'station-row-' + idx;
            
            var safeName = s.name.substring(0, 30) || "NIEZNANA STACJA";
            row.innerText = safeName;
            
            row.onclick = function() { loadAndPlayStation(idx); };
            list.appendChild(row);
        });
    }

    function loadAndPlayStation(idx) {
        var s = foundStations[idx];
        
        // Zmień podświetlenie na liście
        var allRows = document.querySelectorAll('.station-row');
        for(var j=0; j<allRows.length; j++) allRows[j].classList.remove('playing');
        
        document.getElementById('station-row-' + idx).classList.add('playing');
        activeStationIndex = idx;
        
        // Aktualizuj prawy panel
        document.getElementById('meta-name').innerText = s.name || "NIEZNANA";
        document.getElementById('meta-details').innerText = (s.codec || 'UNK') + ' ' + s.bitrate + 'Kbps | LOC: ' + (s.countrycode || 'XX');
        
        // Ładowanie obrazka z fallbackiem
        var coverBox = document.getElementById('cover-art');
        if (s.favicon) {
            var img = new Image();
            img.onload = function() { coverBox.innerHTML = '<img src="' + s.favicon + '">'; };
            img.onerror = function() { coverBox.innerHTML = '<div class="placeholder">📻</div>'; };
            img.src = s.favicon;
        } else {
            coverBox.innerHTML = '<div class="placeholder">📻</div>';
        }

        // Uruchom audio
        audio.src = s.url_resolved || s.url;
        var playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.catch(function(error) {
                statusText.innerText = "KLIKNIJ PLAY (iOS BLOKADA)";
            });
        }
    }

    // Obsługa głównego przycisku Play/Pauza na dolnym pasku
    function toggleMainPlay() {
        if (activeStationIndex === -1 && foundStations.length > 0) {
            // Jeśli nic nie grało, odpal pierwszą stację z listy
            loadAndPlayStation(0);
        } else if (activeStationIndex !== -1) {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }
    }

    // Obsługa suwaka głośności
    document.getElementById('volControl').oninput = function(e) {
        audio.volume = e.target.value;
    };
    audio.volume = 0.7;

    // Animacja wizualizatora
    var lastRenderTime = 0;
    function renderVisualsOptimized(currentTime) {
        requestAnimationFrame(renderVisualsOptimized);
        if (currentTime - lastRenderTime < 100) return; // ok. 10 FPS dla oszczędności baterii
        lastRenderTime = currentTime;

        if (audio.paused || audio.readyState < 3) {
            for(var i=0; i<bars.length; i++) {
                bars[i].style.transform = 'scaleY(0.05)';
                bars[i].style.backgroundColor = 'var(--dim-neon)';
            }
            return;
        }

        for(var j=0; j<bars.length; j++) {
            var val = Math.random() * 255;
            bars[j].style.transform = 'scaleY(' + Math.max(0.1, val / 255) + ')';
            
            if(val > 220) bars[j].style.backgroundColor = 'var(--alert)';
            else if(val > 160) bars[j].style.backgroundColor = 'var(--warn)';
            else bars[j].style.backgroundColor = 'var(--neon)';
        }
    }
    requestAnimationFrame(renderVisualsOptimized);

    // Obsługa klawisza Enter w wyszukiwarce
    document.getElementById('scanTag').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') initiateScan();
    });
</script>
</body>
</html>
