 <!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RADIOLA PRO - ULTIMATE</title>
    <style>
        :root {
            --neon: #00FF41;
            --dim-neon: #004d14;
            --alert: #FF3333;
            --warn: #FFA500;
            --bg: #030303;
            --panel: #0d0d0d;
            --border-width: 2px;
        }

        body {
            background-color: var(--bg); color: var(--neon);
            font-family: 'Consolas', 'Courier New', monospace; font-weight: 900;
            margin: 0; padding: 5px; height: 100vh; box-sizing: border-box;
            overflow: hidden; display: flex; flex-direction: column; text-transform: uppercase;
        }

        #app-container { display: flex; flex-direction: column; height: 100%; width: 100%; gap: 5px; }
        #top-section { display: flex; flex: 1; gap: 5px; overflow: hidden; }

        /* --- LEWY PANEL --- */
        #left-panel {
            width: 230px; display: flex; flex-direction: column; gap: 5px;
            border: var(--border-width) solid var(--neon); background: var(--panel); padding: 5px;
        }

        .input-group { display: flex; gap: 3px; }
        input[type="text"] {
            background: #000; border: 1px solid var(--dim-neon); color: var(--neon);
            padding: 8px; font-family: inherit; width: 100%; font-size: 11px; border-radius: 0;
        }

        .nav-tabs { display: flex; gap: 2px; margin-bottom: 2px; }
        .tab-btn {
            flex: 1; background: #111; border: 1px solid var(--dim-neon); color: var(--dim-neon);
            font-size: 9px; padding: 4px; cursor: pointer;
        }
        .tab-btn.active { color: var(--neon); border-color: var(--neon); background: #000; }

        #results-list {
            flex: 1; overflow-y: auto; background: #000; border: 1px solid #1a1a1a;
            -webkit-overflow-scrolling: touch;
        }

        .station-row {
            padding: 8px 5px; border-bottom: 1px solid #1a1a1a; font-size: 10px;
            display: flex; justify-content: space-between; align-items: center;
            background: #050505; cursor: pointer;
        }
        .station-row.playing { background: #002200; color: white; border-left: 3px solid var(--neon); }
        .fav-star { color: #444; font-size: 14px; padding: 0 5px; }
        .fav-star.active { color: var(--warn); }

        /* --- PRAWY PANEL --- */
        #right-panel {
            flex: 1; border: var(--border-width) solid var(--neon); background: var(--panel);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px; overflow: hidden;
        }

        #cover-art {
            width: 90px; height: 90px; border: 2px solid var(--neon); background: #000;
            display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
        }
        #cover-art img { width: 100%; height: 100%; object-fit: cover; }

        /* Animacja przesuwania tekstu jeśli jest za długi */
        .marquee-box { width: 100%; overflow: hidden; white-space: nowrap; margin-bottom: 5px; }
        #meta-name { display: inline-block; font-size: 14px; padding-left: 100%; animation: marquee 10s linear infinite; }
        
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        #meta-details { font-size: 9px; color: #888; margin-bottom: 10px; }

        #visual-wrapper {
            background: #000; border: 1px solid var(--dim-neon); height: 35px; width: 90%;
            display: flex; align-items: flex-end; justify-content: space-between; gap: 2px; padding: 2px;
        }
        .v-bar { background: var(--neon); flex: 1; height: 100%; transform: scaleY(0.1); will-change: transform; }

        /* --- DOLNY BAR --- */
        #bottom-bar {
            height: 48px; border: var(--border-width) solid var(--neon); background: var(--panel);
            display: flex; align-items: center; padding: 0 10px; gap: 10px;
        }

        #play-btn {
            width: 45px; height: 34px; background: var(--neon); color: black;
            border: none; font-weight: 900; font-size: 18px; cursor: pointer;
        }

        input[type="range"] { -webkit-appearance: none; flex: 1; height: 4px; background: var(--dim-neon); }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 20px; background: var(--neon); }

        #status-info { font-size: 9px; text-align: right; line-height: 1.2; max-width: 80px; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: #333; }
        .led.on { background: #00F3FF; box-shadow: 0 0 8px #00F3FF; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="top-section">
        <div id="left-panel">
            <div class="nav-tabs">
                <div id="tab-search" class="tab-btn active" onclick="switchTab('search')">SZUKAJ</div>
                <div id="tab-favs" class="tab-btn" onclick="switchTab('favs')">ULUBIONE</div>
            </div>
            <div id="search-box" class="input-group">
                <input type="text" id="query" placeholder="WPISZ FRAZĘ...">
                <button class="tab-btn" style="flex:0; padding:0 10px" onclick="performSearch()">OK</button>
            </div>
            <div id="results-list"></div>
        </div>

        <div id="right-panel">
            <div id="cover-art"><div style="font-size:40px">📻</div></div>
            <div class="marquee-box"><div id="meta-name">RADIOLA CORE READY...</div></div>
            <div id="meta-details">STANDBY // NO SIGNAL</div>
            <div id="visual-wrapper"></div>
        </div>
    </div>

    <div id="bottom-bar">
        <button id="play-btn" onclick="togglePlay()">▶</button>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="0.7">
        <div id="status-info"><div id="rate">0 KBPS</div><div id="mode">IDLE</div></div>
        <div id="conn-led" class="led"></div>
    </div>
</div>

<audio id="core"></audio>

<script>
    const API = "https://de1.api.radio-browser.info/json/stations/search";
    const PROXY = "https://corsproxy.io/?";
    let found = [], favorites = JSON.parse(localStorage.getItem('favs') || '[]');
    let currentIdx = -1, isFavView = false;
    const audio = document.getElementById('core'), led = document.getElementById('conn-led');

    function switchTab(type) {
        isFavView = (type === 'favs');
        document.getElementById('tab-search').classList.toggle('active', !isFavView);
        document.getElementById('tab-favs').classList.toggle('active', isFavView);
        document.getElementById('search-box').style.display = isFavView ? 'none' : 'flex';
        isFavView ? renderList(favorites) : renderList(found);
    }

    async function performSearch() {
        const q = document.getElementById('query').value;
        if(!q) return;
        const list = document.getElementById('results-list');
        list.innerHTML = '<div style="text-align:center;padding:20px;font-size:10px">SKANOWANIE CZĘSTOTLIWOŚCI...</div>';
        
        try {
            // Szukamy agresywnie po nazwie I tagach
            const r = await fetch(`${API}?limit=50&name=${encodeURIComponent(q)}&hidebroken=true&order=clickcount&reverse=true`);
            const data = await r.json();
            found = data;
            renderList(found);
        } catch(e) { list.innerHTML = "BŁĄD POŁĄCZENIA"; }
    }

    function renderList(items) {
        const list = document.getElementById('results-list');
        list.innerHTML = items.length ? '' : '<div style="text-align:center;padding:20px;font-size:10px">BRAK DANYCH</div>';
        items.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = `station-row ${currentIdx === i ? 'playing' : ''}`;
            const isFav = favorites.some(f => f.stationuuid === s.stationuuid);
            row.innerHTML = `
                <div style="flex:1" onclick="play(${i})">${s.name.substring(0,25)}</div>
                <div class="fav-star ${isFav?'active':''}" onclick="toggleFav(event, ${i})">★</div>
            `;
            list.appendChild(row);
        });
    }

    function play(idx) {
        currentIdx = idx;
        const s = isFavView ? favorites[idx] : found[idx];
        document.getElementById('meta-name').innerText = s.name + " • " + (s.tags || "");
        document.getElementById('meta-details').innerText = `${s.codec} ${s.bitrate}KBPS | ${s.countrycode}`;
        document.getElementById('rate').innerText = s.bitrate + " KBPS";
        
        // Proxy dla HTTP i obrazków
        let url = s.url_resolved || s.url;
        if(url.startsWith('http:')) url = PROXY + encodeURIComponent(url);
        
        let favIco = s.favicon;
        if(favIco && favIco.startsWith('http:')) favIco = PROXY + encodeURIComponent(favIco);
        document.getElementById('cover-art').innerHTML = favIco ? `<img src="${favIco}">` : `<div style="font-size:40px">📻</div>`;

        audio.src = url;
        audio.play().catch(() => document.getElementById('mode').innerText = "TAP PLAY");
        renderList(isFavView ? favorites : found);
    }

    function togglePlay() { 
        if(audio.paused) audio.play(); else audio.pause(); 
    }

    function toggleFav(e, idx) {
        e.stopPropagation();
        const s = isFavView ? favorites[idx] : found[idx];
        const fIdx = favorites.findIndex(f => f.stationuuid === s.stationuuid);
        if(fIdx > -1) favorites.splice(fIdx, 1); else favorites.push(s);
        localStorage.setItem('favs', JSON.stringify(favorites));
        switchTab(isFavView ? 'favs' : 'search');
    }

    // Audio events
    audio.onplaying = () => { led.classList.add('on'); document.getElementById('mode').innerText = "LIVE"; document.getElementById('play-btn').innerText = "⏸"; };
    audio.onpause = () => { led.classList.remove('on'); document.getElementById('mode').innerText = "STOP"; document.getElementById('play-btn').innerText = "▶"; };
    document.getElementById('volume').oninput = (e) => audio.volume = e.target.value;

    // Visualizer
    const vWrap = document.getElementById('visual-wrapper');
    const bars = Array.from({length: 15}, () => {
        const b = document.createElement('div'); b.className = 'v-bar';
        vWrap.appendChild(b); return b;
    });

    function anim() {
        bars.forEach(b => {
            const h = (!audio.paused) ? Math.random() * 100 : 10;
            b.style.transform = `scaleY(${h/100})`;
            b.style.backgroundColor = h > 80 ? 'var(--alert)' : (h > 50 ? 'var(--warn)' : 'var(--neon)');
        });
        setTimeout(() => requestAnimationFrame(anim), 100);
    }
    anim();

    // Enter to search
    document.getElementById('query').onkeypress = (e) => { if(e.key === 'Enter') performSearch(); };
</script>

</body>
</html>
